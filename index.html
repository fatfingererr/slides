<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricky's Slides</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 3rem;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin-top: -2.5rem;
            margin-bottom: 3rem;
            font-size: 1rem;
        }
        .slides-grid { display: grid; gap: 1rem; }
        .slide-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .slide-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .slide-title { font-size: 1.25rem; font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .slide-date { font-size: 0.875rem; color: #666; }
        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 4rem 2rem;
        }
        .footer {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255,255,255,0.6);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Slides</h1>
        <p class="subtitle">Generated by content-to-slides</p>
        <div class="slides-grid" id="slidesList"></div>
        <div class="footer">
            <p>Auto-generated from GitHub: fatfingererr/slides</p>
        </div>
    </div>

    <script>
        const slides = [
            { file: 'cortex-hydra-slides-2025-03-14.html', title: "Cortex Hydra Slides (2025-03-14)", date: '2025-03-14' },
            { file: 'cortex-hydra-slides-2026-03-14.html', title: "Cortex Hydra Slides (2026-03-14)", date: '2026-03-14' },
            { file: 'openclaw-session-migration-slides-20260314.html', title: "Openclaw Session Migration", date: '' }
        ];

        const list = document.getElementById('slidesList');
        
        if (slides.length === 0) {
            list.innerHTML = '<div class="empty-state">No slides yet. Check back soon!</div>';
        } else {
            slides.sort((a, b) => new Date(b.date) - new Date(a.date));
            slides.forEach(slide => {
                const card = document.createElement('a');
                card.href = slide.file;
                card.className = 'slide-card';
                card.innerHTML = '<div class="slide-title">' + slide.title + '</div>' +
                    '<div class="slide-date">📅 ' + slide.date + '</div>';
                list.appendChild(card);
            });
        }
    </script>
</body>
</html>
